<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Taxi-Lohnliste → DATEV</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.7.3/build/stlite.css" />
  <style>
    html, body, #root { height: 100%; margin: 0; }
    #boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, system-ui, sans-serif; color: #555;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <div id="boot">Lade Python-Runtime (einmalig ~10 Sekunden) …</div>
  <div id="root"></div>

  <script type="module">
    import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.7.3/build/stlite.js";

    const v = "?v=" + Date.now();

    mount(
      {
        requirements: ["openpyxl"],
        entrypoint: "app.py",
        files: {
          "app.py":     { url: "./app.py" + v },
          "parser.py":  { url: "./parser.py" + v },
          "writer.py":  { url: "./writer.py" + v },
          "mapping.py": { url: "./mapping.py" + v },
          "config.py":  { url: "./config.py" + v },
        },
      },
      document.getElementById("root"),
    ).then(() => {
      document.getElementById("boot")?.remove();
    });
  </script>
</body>
</html>
